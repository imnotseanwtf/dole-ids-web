; Performance tuning for the containerized app. The app code is served over a
; bind mount (slow per-file I/O on Windows/WSL2), so we keep OPcache from
; re-stat'ing every file each request and grow the realpath cache.
;
; NOTE: validate_timestamps=0 means PHP code edits are NOT picked up until
; php-fpm reloads. After editing PHP, run: docker compose restart dole-ids-web.app
opcache.enable=1
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.max_accelerated_files=20000
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.jit=tracing
opcache.jit_buffer_size=64M
realpath_cache_size=4096k
realpath_cache_ttl=600
