; Keep a fixed pool of warm php-fpm workers. With the default pm=dynamic, idle
; workers are reaped between requests, so each new request hits a cold worker
; that must re-warm its realpath cache over the slow bind mount (~2-3s). A static
; pool keeps workers warm, so requests stay fast (~0.2s).
[www]
pm = static
pm.max_children = 8
pm.max_requests = 0
