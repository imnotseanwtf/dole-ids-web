services:
    dole-ids-web.app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${DOCKER_REGISTRY-}dole-ids-web.app
        container_name: DoleIdsWeb.App
        restart: unless-stopped
        tty: true
        working_dir: /var/www/html
        ports:
            - "5174:5174"
        volumes:
            - ./src:/var/www/html
            - ./src/storage/:/var/www/html/storage
            # Perf tuning (OPcache + static php-fpm pool) so the bind-mounted app
            # stays fast. Applied on recreate without needing an image rebuild.
            - ./php/performance.ini:/usr/local/etc/php/conf.d/zz-performance.ini
            - ./php/fpm-performance.conf:/usr/local/etc/php-fpm.d/zz-perf.conf
        networks:
            - dole-ids-web-network

    dole-ids-web.webserver:
        image: nginx
        container_name: DoleIdsWeb.WebServer
        restart: unless-stopped
        tty: true
        ports:
            - "8002:8004"
        volumes:
            - ./src:/var/www/html
            - ./nginx/dole-ids-web.conf:/etc/nginx/conf.d/default.conf
        networks:
            - dole-ids-web-network

    dole-ids-web.database:
        image: postgis/postgis:latest
        container_name: DoleIdsWeb.Database
        restart: unless-stopped
        tty: true
        environment:
            - POSTGRES_DB=dole_ids_web
            - POSTGRES_USER=dole
            - POSTGRES_PASSWORD=dole_pass
            - POSTGRES_ROOT_PASSWORD=dole_pass
        volumes:
            - dole-ids-web-dbdata:/var/lib/postgresql/data
        ports:
            - "8833:5432"
        networks:
            - dole-ids-web-network

networks:
    dole-ids-web-network:
        driver: bridge

volumes:
    dole-ids-web-dbdata:
