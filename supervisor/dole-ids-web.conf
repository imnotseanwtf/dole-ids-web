[supervisord]
nodaemon=true

[program:php-fpm]
process_name=%(program_name)s
command=php-fpm
autostart=true
autorestart=true

[program:vite]
process_name=%(program_name)s
command=npm run dev
directory=/var/www/html
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/vite.log
stopasgroup=true
killasgroup=true

[program:jobs-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work database --tries=5 --max-time=1700
autostart=true
autorestart=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker.log
